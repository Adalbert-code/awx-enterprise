---
- name: Post-patch report — vérification et rapport final
  hosts: okd_workers
  gather_facts: true
  tasks:

    - name: Récupérer kernel post-patch
      ansible.builtin.command: uname -r
      register: kernel_post
      changed_when: false

    - name: Vérifier les services critiques OKD
      ansible.builtin.systemd:
        name: "{{ item }}"
      register: service_status
      loop:
        - kubelet
        - crio
      ignore_errors: true

    - name: Rapport des services
      ansible.builtin.debug:
        msg:
          - "Service {{ item.item }} : {{ item.status.ActiveState | default('unknown') }}"
      loop: "{{ service_status.results }}"

    - name: Générer le rapport final consolidé
      ansible.builtin.copy:
        content: |
          ========================================
          PATCH REPORT FINAL — {{ ansible_date_time.date }}
          ========================================
          Host    : {{ inventory_hostname }}
          OS      : {{ ansible_distribution }} {{ ansible_distribution_version }}
          Kernel  : {{ kernel_post.stdout }}
          
          Services OKD :
          {% for svc in service_status.results %}
          - {{ svc.item }} : {{ svc.status.ActiveState | default('unknown') }}
          {% endfor %}
          
          Status  : PATCH COMPLETED
          ========================================
        dest: /tmp/post-patch-{{ inventory_hostname }}.txt
        mode: '0644'
      delegate_to: localhost
